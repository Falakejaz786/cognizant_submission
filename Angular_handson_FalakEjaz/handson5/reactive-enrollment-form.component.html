<form
  [formGroup]="enrollForm"
  (ngSubmit)="onSubmit()">

  <input
    formControlName="studentName"
    placeholder="Student Name">

  <br><br>

  <input
    formControlName="studentEmail"
    placeholder="Email">

  <br><br>

  <input
    formControlName="courseId"
    placeholder="Course ID">

  <div
    *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">

    Course code starting with XX is not allowed

  </div>

  <br>

  <select formControlName="preferredSemester">

    <option value="Odd">Odd</option>

    <option value="Even">Even</option>

  </select>

  <br><br>

  <label>

    <input
      type="checkbox"
      formControlName="agreeToTerms">

    Agree Terms

  </label>

  <br><br>

  <button
    type="button"
    (click)="addCourse()">

    Add Another Course

  </button>

  <br><br>

  <div
    *ngFor="
      let ctrl of additionalCourses.controls;
      let i = index
    ">

    <input [formControl]="ctrl">

    <button
      type="button"
      (click)="removeCourse(i)">

      Remove

    </button>

  </div>

  <br>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">

    Submit

  </button>

</form>
